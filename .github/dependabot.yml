version: 2
updates:
  # Rust dependencies (the Cargo workspace).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      # Batch low-risk updates into a single PR to cut review noise.
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by CI.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        update-types:
          - minor
          - patch
