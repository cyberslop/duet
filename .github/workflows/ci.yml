name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on a PR; always finish runs on main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  # Treat rustc warnings as errors everywhere — CONTRIBUTING sets "zero warnings" as the bar.
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build
        run: cargo build --workspace --all-targets --locked
      - name: Test
        run: cargo test --workspace --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust (stable + clippy)
        run: |
          rustup toolchain install stable --profile minimal --component clippy --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # Visibility only — not a required check. cargo-llvm-cov manages its own
    # instrumentation flags, so don't impose the -D warnings RUSTFLAGS here.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust (stable + llvm-tools)
        run: |
          rustup toolchain install stable --profile minimal --component llvm-tools-preview --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-llvm-cov
      - name: Coverage summary
        run: |
          {
            echo '## Coverage'
            echo '```'
            cargo llvm-cov --workspace --locked --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
