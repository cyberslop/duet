name: Dependency Review

# Block PRs that introduce a dependency with a known vulnerability, before it
# reaches main. Complements Dependabot (which alerts after the fact) and
# cargo-deny (which owns the license/advisory policy for the whole tree).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: moderate
