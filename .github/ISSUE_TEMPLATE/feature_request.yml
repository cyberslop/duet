name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the motivation. What's missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would you like to see? If it's a new model provider, workflow/domain,
        or profile, note where it would fit (see "Common extension points" in CONTRIBUTING.md).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
    validations:
      required: false
